version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dcpr_postgres
    environment:
      POSTGRES_DB: dcpr_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  neo4j:
    image: neo4j:5-community
    container_name: dcpr_neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP Browser UI
      - "7687:7687" # Bolt Protocol
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    restart: always

volumes:
  pgdata:
  neo4jdata:
  neo4jlogs:
