  raw_selected_text: 'DCPR-2034 PART - VI ADDITIONAL FLOOR SPACE INDEX Boundaries
    and Area of Proposed CDS shall be decided as per the approved layout and be confirmed
    by City Survey Officer after actual measurement of CDS on site and the same shall
    be adopted for planning purpose. However wherever necessary, the area may be further
    subdivided to earmark separate plots/ Sectors for the planning purpose, handing
    over of Reservations, amenities, realigned roads, etc. to MCGM/ Appropriate Authority.
    The Plot area and the BUA in terms of sq. m of the said subdivided plots/ Sectors
    shall be separately Inentioned in the Conveyance Deed or lease deed. In case of
    land of different tenures, single PRC shall not be insisted. However, necessary
    entries about CDS shall be made in respective PRC. In specific cases where CDS
    is not bounded by roads, nallas and railway lines, the boundary of the Cluster
    may be decided by the Municipal Commissioner. 1.2 The CD may consist of a mix
    of structures of different characteristics such as (i) Cessed buildings in Island
    City, which attract the provisions of MHAD Act, 1976. (a) Buildings at least 30
