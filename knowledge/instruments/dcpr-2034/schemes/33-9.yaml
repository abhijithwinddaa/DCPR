    is payable at 60% of land rate as per ASR (for FSI I) except if the undertaken
    by State Govt. & MCGM itself. These tenements shall be made available for general
    public for the AH as per policy of Govt. c) The development of OA as per the requirements
    of MCGM shall be permissible as per these Regulations. Provided further that Municipal
    Commissioner''s decision regarding development of OA shall be final & binding.
