  raw_selected_text: 'DCPR-2034 PART - VI ADDITIONAL FLOOR SPACE INDEX (B) For Slum
    Areas: i. All the protected Occupiers as defined in Chapter IE of Slum Act and
    orders issued thereunder and certified by competent authority thereof. ii. A structure
    shall mean all the dwelling areas of all persons who are enumerated as living
    in one numbered house in the electoral roll of the latest date, upto 1st January
    2000 or such other reference date Notified by the Govt. and regardless of the
    number of persons, or location of rooms or access. Land pooling for the CDS: 3.
    The Promoter of CDS shall try to pool lands belonging to various categories of
    land holders including Public lands by obtaining their consent for including their
    lands in the proposed CDS, by resorting to any of the following methods of land
    pooling: 1) Purchase of lands, including buildings, if any, standing thereupon,
    Provided that if the Promoter wishes to include any building or land belonging
    to the State Govt. or MCGM or MHADA or any Agency under the control of State Govt.
    (hereinafter collectively referred as "Public Authority"), then he shall make
    a written request in this regard through the Municipal Commissioner to an Empowered
    Committee (EC) headed by the Chief Secretary. This EC shall be as formulated by
    GoM. The EC shall examine the request made by the Promoter in terms of the desirability
    of making the land belonging to a Public Authority available for CDS and would
    decide the terms of transfer of such land to the Promoter for the purpose of implementing
    CDS. In case the land sought by the Promoter belongs to an Authority created by
    or under a statute, the decision of the EC shall be subject to ratification/ approval
    by such Au thority. 2) Exchange of such land with a suitable land of at least
    equivalent value as per ASR land rates. 3) Procurement of DRS over such land,
    by way of registered document by the Promoter, provided that the area over which
    the Promoter holds DRS shall be regarded as one plot for all the purp'
