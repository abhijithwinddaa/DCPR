conflicts:
  - id: finding:33-9:source-version-conflict
    severity: BLOCKER
    status: OPEN
    description: >
      Government-hosted copies inspected during architecture review contain
      different values for suburban minimum cluster area, overall consent, and
      minimum slum rehabilitation carpet area.
    required_resolution: >
      Identify the legally applicable sanction notification and complete
      amendment chain for the demo as-of date.

  - id: finding:33-9:fsi-area-basis-review
    severity: BLOCKER
    status: OPEN
    description: >
      Clause 6(a) requires a reviewed interpretation of the phrase governing
      FSI on gross plot area while excluding reservations, existing amenities,
      road setback, and existing Municipal roads, and including specified BUA.
    required_resolution: >
      Approve an explicit AreaBasisPolicy and reservation/road BUA treatment.

concepts:
  - id: concept:gross-cluster-area
    type: PlotArea
    unit: square_metre

  - id: concept:fsi-base-area
    type: AreaBasis
    unit: square_metre

  - id: concept:certified-admissible-rehabilitation-bua
    type: RehabilitationComponent
    unit: square_metre
    input_policy: REQUIRED_FOR_DEMO
    note: >
      The demo accepts certified rehab BUA and its component breakdown. It does
      not invent a carpet-area-to-BUA conversion.

  - id: concept:incentive-fsi
    type: IncentiveFSI

  - id: concept:fungible-compensatory-area
    type: FungibleCompensatoryArea
    fsi_treatment: EXCLUSIVE_OF_SCHEME_FSI

  - id: concept:tdr
    type: TransferableDevelopmentRight
    fsi_treatment: GENERATES_TDR_OFFSITE

