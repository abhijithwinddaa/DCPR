  raw_selected_text: DCPR-2034 PART - VIIIGENERAL BUILDING REQUIRMENTS (i) Types-The
    parking spaces mentioned below include parking spaces in basements, parking floor,
    and podium or on a floor supported by stilts, or on upper floors, covered or uncovered
    spaces in the plot. (ii) Size of Parking Space-The minimum sizes of parking spaces
    to be provided shall be as shown below- Type of Vehicle (a) Motor vehicle (b)
    Scooter, Motor-cycle minimum 1.2 m) (c) Bicycle Minimum size/ Area of parking
    space 2.5 m x 5.5m 3 sq.m (Least dimension shall be 1.4 sq.m (d) Transport Vehicle/
    School Bus 3.75 m x 7.5 m Note- In the case of parking spaces for motor vehicles,
    upto 50 per cent of the prescribed space may be of the size of 2.3 m x 4.5 m.
    (iii)Marking of Parking Spaces-Parking spaces shall be paved and clearly marked
    for different types of vehicles. (iv)Maneuvering and other ancillary spaces- Off-street
    parking space must have adequate vehicular access to a street, and the area shall
    be exclusive of drives, aisles and such other provisions required for adequate
    maneuvering of vehicles. (v)Ramps for Basement Parking-Ramps for parking in basements
    shall conform to the requirements of sub-regulations (16) of Regulation 37. (2)
    Quantitative Requirements-Four wheeled auto-vehicles-Parking spaces for four wheeled
    auto vehicles shall be provided as in Table No 21 below, any fractional space
    of more than half resulting from the ratios in column (3) thereof being rounded
    off upward to the nearest integer. Provided that the Government may change parking
    requirements, as per the recommendations of the committee constituted by the Government
    in this regard. Development Plan 2034 Developrnent Control andPromotionRegulation-2034
    Municipal Corporation of Greater Mumbai 352
