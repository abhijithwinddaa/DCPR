    rain water after storage may be recharged into ground through percolation pits
    or trenches or combination of pits and trenches. Depending on the geomorphological
    and topographical condition, the pits may be of the size of 1.20 m width x 1.20
    m length x 2.00 m to 2.50 m depth. The trenches can be of 0.60 m width x 2.00
    to 6.00 m length x 1.50 to 2.00 m depth. Terrace water shall be channeled to pits
    or trenches. Such pits or trenches shall be back filled with filter media comprising
    the following materials. a) 40 mm stone aggregate as bottom layer up to 50% of
    the depth; b) 20 mm stone aggregate as lower middle layer up to 20% of the depth;
    c) Coarse sand as upper middle layer up to 20% of the depth; d) A thin layer of
    fine sand as top layer; e) Top 10% of the pits/ trenches will be empty and a splash
    is to be provided in this portion in such a way that roof top water falls on the
    splash pad. f) Brick masonry wall is to be constructed on the exposed surface
    of pits/ trenches and the cement mortar plastered. The depth of wall below ground
    shall be such that the wall prevents lose soil entering into pits/ trenches. The
