    x1: 1.0
    y1: 1.0
  raw_selected_text: 'DCPR-2034 PART - VI ADDITIONAL FLOOR SPACE INDEX 1.2 For those
    structures having residential areas more than 27.88 sq. m (300 sq. ft.) will be
    eligible for residential tenement having carpet area totaling to 37.16 sq. m (400
    sq. ft.). Out of this total 37.16 sq. m area, 27.88 sq. m (300 sq. ft.) area will
    be free of cost and area above 27.88 sq. m (300 sq. ft.) admeasuring 9.29 sq.
    m (100 sq. ft.) will be at construction cost to be determined by OSD, DRP (SRA)
    and the said cost to be paid by the hutment dweller to the developer. Carpet area
    shall mean exclusive of all areas under walls including partition walls if any
    in the tenement. Only 37.16 sq. m (400 sq. ft.) carpet area shall be given and
    if proposal contains more area, it shall not be taken up for consideration. For
    the purpose of, "Carpet area" as per 1.1 &1.2 above means the net usable floor
    area within a tenement excluding that covered by the walls or any other areas
    specifically exempted from floor space index computation as per then/ prevailing
    Regulation but including the areas of balcony if allowed free of FSI as per then
    Regulation 1.3 All eligible hutment dwellers taking part in the DRP shall have
    to be rehabilitated according to the provisions in this Regulation. It may be
    in the same sector or other sectors within the jurisdiction of DRP. 1.4 Pavement
    dwellers and hutment dwellers in the slum on the land required for vital urgent
    public utility/ purpose or on the hazardous location or affected by DP proposals
    shall not be rehabilitated in-situ but in other available plots within jurisdiction
    of DRP. 1.5 A certified extract of the relevant electoral roll shall be considered
    adequate evidence to establish the eligibility of a person provided he is found
    residing in the structure. This is to avoid the possibility of persons who have
    left the structure coming back to claim free tenement under the scheme even though
    they have in the normal course left the slum and gone away into a proper non-slum
    area '
