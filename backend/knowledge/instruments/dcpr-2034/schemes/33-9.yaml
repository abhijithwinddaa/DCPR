    for four years in the aggregate, but shall have to be renewed before the expiry
    of one year from the date of its issue. The application for renewal shall be made
    before expiry of one year, if the work has not already commenced. Such renewal
    can be done for three consecutive terms of one year each, after which proposals
    shall have to be submitted to obtain development permission afresh. For the purpose
    of this Regulation, *Commencement- shall mean as under: - (a) (b) (d) For a building
    work including additions and alterations bridges For overhead Tanks Upto plinth
    level or where there is no plinth, upto level of lower upper basement or stilt,
    as the and case may be. Foundation and For Underground works For lay-out, sub-division
    and proposals amalgamation Payments of the development Construction work up to
    the base Floor. Foundation and Construction work up to floor of underground Floor.
    Final demarcation and provisions of infrastructure and services up to the following
    stages: (i) Roads: Water bound macadam complete. (ii) Sewerage, Drainage and water
    supply excavation and base concreting complete. charges/ premium/ development
    cess/off-site infrastructure charges/fees: Development permission/ Commencement
    certificate shall be granted only on payment of the requisite fees, development
    charges, premiums, Development cess/ off-site infrastructure charges, as applicable
    for the proposal. The development shall be considered unauthorized if carried
    out without requisite payments to the Government/ MCGM/ Planning Authority. 36'
