  raw_selected_text: 'DCPR-2034 PART - ENVIRONMENTAL SUSTAINABILITY The installation
    of the electrical backup in all such water heating systems shall be optional depending
    on the nature of requirement of hot water. It is suggested that SWH systems of
    the capacity of about 100 liters per day on thermosyphon with necessary electrical
    back-up be installed at residential buildings like hostels. In order to facilitate
    the installation of the SW H systems, the new buildings of aforesaid types shall
    have the following provisions. I) All such buildings where SW H systems are to
    be installed will have open sunny roof area available for installation of SWH
    system. 2) The roof loading adopted in the design of such building should be at
    least 50 kg/sq. m for the installation of SWH system. 3) SWHsystems can also be
    integrated with the building design. These can either be put on the parapet or
    could be integrated with the south facing, vertical wall of the building. The
    best inclination of the solar energy collector for regular use throughout the
    year is equal to the local Latitude of the place. The solar energy collector should
    be facing south. However, for only winter use, the optimum inclination of the
    solar energy collector would be Latitude+15 degrees of the south. 4) All the new
    buildings of aforesaid types to be constructed shall have an installed hot water
    line from the roof top and also insulated distribution pipelines to each of the
    points where hot water is required in the building. 5) The capacity of the SWH
    system to be installed on the building shall be decided on the basis of the average
    occupancy of the buildings. The norms for hospitals, hotels and other buildings
    are given below: Sr. No. Type of Building 1 2 3 4 5 Hospitals Hotels Hostels &
    other such buildings Canteen Laboratory & Research Institutions Per capita capacity
    recommended (litres per day). 100 150 25 As required As required. Development
    Plan 2034 of Greater Mumbai Development Control andPromotionRegulation-2034 397'
