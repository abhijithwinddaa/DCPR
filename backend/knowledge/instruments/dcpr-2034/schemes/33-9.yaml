  raw_selected_text: 'DCPR-2034 PART - IX URBAN SAFETY REQUIREMENTS (a) (i) The refuge
    area shall be preferably provided within building line at floor level. (ii) In
    case of high rise buildings having height more than 32 m, first refuge area shall
    be provided at 24 m or at 1st habitable floor, whichever is higher. Thereafter,
    the refuge area shall be provided at every 7th habitable floor. The refuge area
    shall be 4% of the habitable floor area it serves, and will be free of FSI. With
    the permission of Commissioner due to planning constraints it may be allowed to
    be exceeded up to maximum limit of 4.25%. If it exceeds 4.25%, the excess area
    shall be counted in FSI. (b) For buildings having height upto 70 m, as an alternate,
    Refuge areas can be provided as RCC cantilever projections at the alternate mid-landing
    levels of staircase, free of FSI. Each refuge area at mid-landing shall have a
    minimum width of 3.0 m, and minimum area of 10.0 sq. m for residential and 15
    sq. m for non-residential buildings. (c) In case of buildings upto 32 m height,
    the terrace floor of the building shall be treated as the refuge area. (9) Fire
    Escape Chutes/ Controlled Lowering Device for evacuation- (A) (i)High rise building
    having height more than 70 m shall necessarily be provided with fire escape chute
    shaft/ s for every wing adjacent to staircase. (ii)Walls of the shaft shall have
    4 hours'' fire resistance. (iii)One side of the shaft shall be at external face
    of the building with proper ventilation. (iv)The dimension of the shaft shall
