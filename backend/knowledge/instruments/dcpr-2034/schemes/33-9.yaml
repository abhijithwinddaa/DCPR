  raw_selected_text: "DCPR-2034 PART-XI MISCELLANEOUS PROVISIONS 57. PART X1 MISCELLANEOUS\
    \ PROVISIONS Temporary Constructions The Commissioner may grant permission for\
    \ temporary construction of a period not exceeding six month at a time and in\
    \ the aggregate, not exceeding a period of three years. Such permission may be\
    \ given by him for the construction of the following, namely: Structures for protection\
    \ from the rain or covering of the terraces during the monsoon only; (ii) Pandals\
    \ for fairs, ceremonies, religious functions,circus, jatra, folk dance etc; (iii)\
    \ Structures for godowns/storage of construction materials within the site; (iv)\
    \ Temporary site offices and watchmen chowkies and labourer hutments with cr\xE9\
    che, sales office/ sample or show flat within the site only during the phase of\
    \ construction of the main building; Structure for exhibitions/ circuses,etc.;\
    \ (v) (vi) For factories in industrial lands, structures within the site for storage\
    \ of machinery before installation; (vii) Structures for ancillary works for quarrying\
    \ operations in conforming zones; (viii) Milk booths and telephone booths; (ix)\
    \ Transit accommodation for persons to be rehabilitated in a new construction:\
    \ (x) Structures for educational and medical facilities within the site of the\
    \ proposed building during the phase of planning and constructing the said permanent\
    \ buildings: (xi) On site, Ready Mix Concrete (RMC) plant for the use at site\
    \ under development/ construction. (xii) Provided that temporary construction\
    \ for structures, etc. mentioned at (iii), (iv), (vi), (ix), (x) and (xi) maybe\
    \ permitted to be continued temporarily by the Commissioner but in any case, not\
    \ beyond completion of construction of the main structure or building, and that\
    \ structure in (viii) may be continued on annual renewable basis by the Commissioner\
    \ beyond a period of three years. Development Control andPromotionRegulation-2034\
    \ 387 Development Plan 2034 of Greater Mumbai"
