    x1: 1.0
    y1: 1.0
  raw_selected_text: "DCPR-2034 PART - VIIIGENERAL BUILDING REQUIRMENTS 1 Scope: These\
    \ bye laws are applicable to all existing and proposed public buildings & facilities\
    \ having BUA more than 2000 sq. m. In case of proposed residential buildings and\
    \ public buildings/ facilities having BUA less than 2000sq. m the access path\
    \ and walkways up to lift/ staircase on ground level/ stilt/ podium from drop\
    \ off zone shall be provided for differently abled persons. 2. Site Development:\
    \ Level of the roads, access paths and parking areas shall be described in the\
    \ plan along with specification of the materials. 2.1 Access path/ walk way- Access\
    \ path from plot entry and surface parking to building entrance shall be of minimum\
    \ 1.5 m width having even surface without any slope. Slope if any shall not have\
    \ gradient greater than I in 20. Finishes shall have a nonskid surface with a\
    \ texture traversable by a wheel chair. Where transfer has to be made from a vehicular\
    \ surface to a pedestrian surface, the driveway and the pavement or footway surfaces\
    \ shall be blended to a common level or ramp. Kerb Ramps shall be preferably provided.\
    \ (A) Kerb Ramps Provision and Location Dimensio ns and slopes Design and Finish\
    \ Kerb Ramps are to be provided where the vertical rise is less than 0.15m, located\
    \ or protected to prevent obstruction by parked vehicles and should be free from\
    \ any obstruction such as signposts, traffic lights, etc. The gradient of a kerb\
    \ ramp should not be steeper than 1:12, the flared sides should not be more than\
    \ 1:10 and width should not be less than 0.9 m. A slip-resistant surface, should\
    \ be designed not to allow water accumulating on the walking surface, should not\
    \ project onto the road surface B)Drop-off Zone Provision & Location Dimensions\
    \ Drop-off zones if provided should be at the same rade as the drivewa \u2022\
    \ Min width of drop-off zone 1.5 m, and min length 4.5 m. \u2022 Change in level\
    \ between the drop-off and the plinth should be through a ramp of maximum radient\
    \ 1:12 Development Plan 2034 Develop"
