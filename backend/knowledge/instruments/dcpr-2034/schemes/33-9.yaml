    x1: 1.0
    y1: 1.0
  raw_selected_text: 'DCPR-2034 APPENDICES AND ANNEXURES (b) The call boxes shall
    be of the ''break-glass'' type without any moving parts where the call is transmitted
    automatically to the control room without any other action on the part of the
    person operating the call box. (c) All call boxes shall be wired in a closed circuit
    to a control panel in the control room located as given in this rule so that the
    floor number where the call box is actuated is clearly indicated on the control
    panel. The circuit shall also include one or more batte ries with a capacity of
    48 hours normal working at full load. The battery shall be arranged to be continuously
    trickle-charged from the electric mains. The circuit may be connected to an alternate
    source of electric supply. (d) The call boxes shall be arranged to sound one or
    more sounders so as to ensure that all the occupants of the building are warned
    whenever any call box is actuated. (e) The call boxes shall be so installed that
    they do not obstruct the (ii) exit-ways and yet their location can easily be noticed
    from either direction. The base of the call box be at a height of 1 m. from the
    floor level. All other buildings exceeding 32 m. height excluding those mentioned
    in clause (i) above: - These buildings shall, in addition to the manually operated
    electrical fire alarm system, be equipped with an automatic fire alarm system.
    The latter shall be in addition to any automatic fire- extinguishing system installed
    in any particular occupancy in accordance with these rules. The detectors for
    the automatic fire alarm shall conform to the relevant IS Specification Heat Smoke
    Sensitive Type Fire Detector and the system shall be installed in accordance with
    IS: 2189-1976 Code of Practice for Automatic Fire Alarm System of any other relevant
    Indian Standard, prescribed from time to time. Provided that, no automatic detector
    shall be required in any room or portion of a building which is equipped with
    an approved installation of automatic sprinklers. 15.'
