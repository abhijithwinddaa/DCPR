    application. However, clubbing shall be allowed only if it leads to an independent
    plot / building / wing as the case may be with AH/ R&R component being handed
    over to Planning Authority. The developer shall have to pay as an unearned income
    equal to 40% of difference of sale value of shifted built up area of AH/ R&R component
    as per ASR. Such clubbing can be allowed for the schemes falling in same ward
