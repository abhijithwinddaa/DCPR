    may be permitted at upper floors with step-back tomake up for deficiencies in
    the open space in case of new development as required under these Regulations
    subject to fulfillment of structural requirements or else TDR in lieu of subsequent
    set back area as provided under these regulations may be allowed. (b) Step-back
    at upper level- The Commissioner may permit smaller step-backs at upper levels
    and also permit additional floor area upto a limit of IOsq. m over the permissible
    FSI to avoid structural difficulties or hardship but so as not to affect adversely
    the light and ventilation of an adjoining building or part thereof. (c) Tower-like
    structures- Notwithstanding any provision to the contrary, a tower-like structure
    may be permitted only with 6 m open space at the ground level and onestep-back
    at the upper levels provided that the total height does not exceed 32m. If it
    exceeds 32m but does not exceed 70m, the minimum open space at ground level shall
    be6 m on rear and one side and 9mon another side accessible from road. In case
    of building exceeding the height of 70 m minimum open space at ground level shall
    be 9 m and two step-back at upper level up to the height of 70 m and for the height
    more than 70 m and up to 120 m three step-backs and for the height beyond 120
    m four step-backs may be allowed. The step-backs shall be provided in such a way
    that the required open spaces as per the provisions of Regulation No. 41(1)(a),41(2)(i)(a)
    & 43(1)are maintained at upper level. The terrace created by the step-back shall
    be accessible through a common passage and / or common staircase only. Provided
    further that such step backs as stated above may also be allowed on one or more
    sides, however on other sides than the step back, shall have to maintain the regular
    open spaces as per these regulations. (it)lndustrial Zone- (a) Bui
