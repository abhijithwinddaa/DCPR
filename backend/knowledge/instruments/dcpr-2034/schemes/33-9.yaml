  raw_selected_text: 'DCPR-2034 PART - VIIIGENERAL BUILDING REQUIRMENTS 3. Building
    Requirements: The specified facilities for the buildings for Differently abled
    persons shall be as follows: 1. Approach to plinth level. 2. Corridor connecting
    the entrance/ exit for the Differently abled persons. 3. Stairways. 4. Lift. 5.
    Toilet. 6. Drinking Water. 3.1 Approach to Plinth Level- Every building shall
    have at least one entrance accessible to the Differently abled persons and shall
    be indicated by proper signage. This entrance shall be approached through a ramp
    together with the stepped entry. 3.1.1 Ramped Approach- Ramp to enter the building
    shall be finished with non-skid material. Minimum width of ramp shall be 1.5 m
    with maximum gradient 1:12. Length of ramp shall not exceed 9.0 m having 0.9 m
    high hand rail on both sides extending 0.3 m beyond top and bottom of the ramp.
    Minimum gap from the adjacent wall to the hand rail shall be 0.050 m. 3.1.2 Stepped
    Approach- For stepped approach size of tread shall not be less than 0.3 m and
    maximum riser shall be 0.15 m with provision of 0.9 m high hand rail on both sides
    of the stepped approach similar to the ramped approach. 3.1.3 Exit/ Entrance Door:
    -The details shall be as under: Provision Location Dimensions & Publicly accessible
    buildings should preferably have automatic/ self-closing doors, instead of manual
    doors. Manual doors should be easy and light in operation. Revolving doors should
    be avoided, but, in cases where a revolving door is the single means of entry,
    adequate space to accommodate wheelchair users should be rovided. a. b. c. The
    minimum clear opening of doorways shall be 0.9 m measured between the face of
    the door and the face of the doorstop with the door open at 900 as illustrated
    in Sketch No 1 in Annexure 23 Thresholds of doorways should not exceed 12 mm.
    Raised threshold and floor level changes at doorways should be leveled off with
    a slope on each side of threshold. Manual doors should incorporate kick plates
    0.3 m-0.4'
