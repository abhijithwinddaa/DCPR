  raw_selected_text: 'DCPR-2034 APPENDICES AND ANNEXURES APPENDIX- 1 (Regulation 47)
    Additional Fire Protection Requirements for High Rise and special Building: -
    I. General In addition to the provisions of fire Protection, National Building
    code of India, the Chief Fire Officer may insist on suitable provisions in, high
    rise and special buildings or premises from the fire safety and fire-fighting
    point of view depending on their occupancy and height. 2. Construction: - (1)
    Building materials: (i) Load bearing elements of construction and elements of
    construction for which the required fire resistance is one hour or more shall
    be of non-combustible material. Interior finish materials (wall paneling, floor
    coverings etc.) may be permitted of materials having their rating for flame spread
    and smoke developed not exceeding a very Iow flame spread limit in accordance
    with IS: 1642, 1960 (Class I) Ceiling linings shall be non-combustible or of plasterboard.
    (ii) Stairways and corridors shall not contain combustible materials. (2) Structural
    members such as supports and load bearing walls shall have fire resistance rating
    of 3 hour, transoms and ceilings at least 2 hours. (3) Internal walls and partitions
    separating corridors from areas on floors that are used for any purpose other
    than circulation shall have a fire resistance of not less than one hour. There
    shall be no openings in such walls other than for doors or delivery hatches with
    fire resistance not less than half an hour. Fire sections (fire walls) sub-dividing
    the building to prevent fire spread, shall have a fire resistance, rating not
    less than two hours. (4)Facades excluding windows and doors shall consist of non-combustible
    building materials. The minimum distance between the top of the opening on a lower
    floor and the sill of that on the floor above it shall be 0.9 m., so that the
    fire would have to travel at least 0.9 m. between storeys. 3. Staircase enclosures:
    - (I) The internal enclosing walls of staircase shall be of brick'
