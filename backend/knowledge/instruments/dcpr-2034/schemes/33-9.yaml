  raw_selected_text: 'DCPR-2034 PART - X SPECIAL PROVISIONS 51. 52. PART X SPECIAL
    PROVISIONS Parking Authority MCGM, with approval of Corporation in consultation
    with GoM, shall constitute a Parking Authority at MCGM level to plan, regulate
    and manage all on/off street parking and public parking places under the physical
    jurisdiction of Greater Mumbai. The constituted Parking Authority, inter alia,
    will fix and promulgate parking fees as well as penalties for various areas/ zones
    in MCGM. Conservation of Heritage 1. Definition: (i) "Conservation" means all
    the processes of looking after a place so as to retain its historical and/or architectural
    and/or aesthetic and/or cultural significance and includes maintenance, preservation,
    restoration, reconstruction and adoption or a combination of more than one of
    these. (ii) "Preservation" means and includes maintaining the fabric of a place
    in its existing state and retarding deterioration. (iii)"Restoration" means and
    includes returning the existing fabric of a place to a known earlier state by
    removing accretions or by reassembling existing components. (iv) "Heritage Site"
    means the area within the boundary / extent of the heritage building / Precinct
    / natural area included in the heritage list and as shown on the map. (v) "Natural
    heritage site" shall include, natural sites or precisely delineated natural areas
    which are of outstanding value from the point of view of science, heritage conservation
    or natural beauty; geological and physiographical formations and precisely delineated
    areas which constitute the habitat of threatened species of animals and plants
    and are of outstanding value from the point of view of ecolow or conservation;
    natural features consisting of physical and biological formations or groups of
    such formations, which are of outstanding (special) value from the aesthetic or
    scientific point of view. Development Control andPromotionReguIation-2034 375
    Munici Development Plan 2034 of Greater Mumbai'
