    closers. The floor landing of staircases shall not form part of common corridor.
    (2) The staircase enclosures on the external wall of a building shall be ventilated
    to the atmosphere at each landing or mid-landing. (3) A permanent vent at the
    top equal to 5 per cent of the cross-sectional area of the enclosure and open
