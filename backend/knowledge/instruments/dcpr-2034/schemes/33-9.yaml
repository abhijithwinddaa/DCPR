    for providing incubation facilities for new units. This area would be treated
    as a part of the Park to be used for IT activities and eligible for additional
    FSI benefits accordingly. Premium to be received by the Planning Authority as
    per provisions in this regulation shall be deposited in a separate fund viz. "Critical
    Infrastructure Fund for IT/ITES Industries" and this fund shall be utilized only
    for creation of Critical Infrastructure for IT/ ITES Industries: Provided that
    in the event, the developer come forward for providing such off site infrastructure
    at his own cost, instead of paying premium as prescribed above, then the Planning
    Authority may determine the estimated cost of the work by using rates prescribed
    in District Schedule of Rates (DSR) of the relevant year, in which order for commencement
    of such work is issued. The Planning Authority shall also prescribe the standards
    for the work. After completion of the works, the Planning Authority shall verify
    and satisfy itself that the same is developed as per prescribed standards and
    thereafter, by deducting the cost of works, the balance amount of premium shall
    be recovered from such developer before issuing Occupancy Certificate. Provided
    that, in case the cost of work is more than the premium to be recovered, such
    additional cost to be borned by such developer. Permission for erecting towers
    and antenna upto height permitted by the Civil Aviation Department shall be granted
    by the Commissioner as per the procedure followed for development permission or
    otherwise as may he decided by the Government. While developing site for IT/ ITES
    with additional FSI, support services as defined in the IT Policy 2015, shall
    be allowed. Development Control andPromobonRegulation-2034 Development Aan 2034
