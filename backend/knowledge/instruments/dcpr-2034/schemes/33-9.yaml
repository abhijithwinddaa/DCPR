    on part or parts of C.S. Nos. or CTS Nos. or S. Nos or F. P. Nos shall be treated
    as natural amalgamation/ subdivision/s of that C.S. or CTS or S. No. or F.P. No.
    for which no separate approval for amalgamation/ subdivision of land would be
    necessary. 3.14 Boundaries and the Slum Rehabilitation Area shall be declared
    by the competent authority after actual measurement of plot area on site and the
    same shall be adopted for planning purpose for calculation of density and floor
    space index. 3.15 The CEO, SRA may if required, adjust the boundary of the plot
    declared as slum rehabilitation area so as to suit the building design and provide
    proper access to these Scheme. Provided further that the encumbered area under
    D P Road/ Sanctioned Regular line road abutting the SRS shall be included in the
    scheme to be developed. 3.16 After approval is given to the Slum Rehabilitation
    scheme, the area may be further subdivided if necessary to earmark separate plots
    for the rehab component and the free sale component. The Plot area and the built-up
    area in terms of square meters on the said plot shall be separately mentioned
