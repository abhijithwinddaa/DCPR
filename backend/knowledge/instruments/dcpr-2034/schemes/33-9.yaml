    wall shall be provided. The roof of the shaft shall be at least I m. above the
    surrounding roof. There shall be no glazing or glass bricks in any internal enclosing
    wall of a staircase. If the staircase is in the core of the building and cannot
    be ventilated at each landing, a positive pressure of 5 mm. water gauge by an
    electrically operated blower shall be maintained. (4) The mechanism for pressuring
    the staircase shaft shall be so installed that it operates automatically and also
    manually when the automatic fire alarm operates. 4. Lift enclosures: - (I) The
