  raw_selected_text: 'DCPR-2034 PART - IX URBAN SAFETY REQUIREMENTS 50. Building services
    (I) Electrical installation:The planning, design and installation of electrical
    air-conditioning and heating work shall conform to the provisions of Part VIII
    Building Service Section 2- Electrical Installations. Section 3- Air-conditioning
    and Heating National Building Code of India. (2) Lifts: (a) Planning and design:The
    planning and design of lifts including their number, type and capacity depending
    on the occupancy of the building, the population on each floor based on occupant
    load and the building height shall be in accordance with section 5- Installation
    of lifts and Escalators,National Building Code of India. (b) Maintenance: (i)
    The lift installation should receive regular cleaning, lubrication, adjustment
    and adequate servicing by authorized competent persons at such intervals as the
    type of equipment and frequency of service demand. In order that the lift installation
    is maintained at all times in a safe condition, a proper maintenance schedule
    shall be drawn up in consultation with the lift manufacturer and rigidly followed.
    A log book to record all items relating to general servicing and inspection shall
    be maintained. The electrical circuit diagram of the lift with the sequence of
    operation of different components and parts shall be kept readily available for
    reference by persons responsible for the maintenance and replacement, where necessary,
    to the satisfaction of the competent authority i.e., Lift Inspector of the Government
    of Maharashtra. (ii) Any accident arising out of operation or maintenance of the
    lifts shall be duly reported to the competent authority i.e., Lift Inspector of
    the Government of Maharashtra. Development Control andPromotionRegulation-2034
    374 Development Plan 2034 of Greater Mumbai'
