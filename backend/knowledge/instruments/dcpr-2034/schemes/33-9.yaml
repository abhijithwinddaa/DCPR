  raw_selected_text: DCPR-2034 PART - LAND USE CLASSIFICATION AND USES PERMITTED (9)(a)
    In order to oversee the due implementation of the package of measures recommended
    by the Board of Industrial and Financial Reconstruction (BIFR) for the revival/rehabilitation
    of a potentially sick and/or closed textile mill, or schemes approved by Government
    for the modernization or shifting of cotton textile mills, and the permissions
    for development or redevelopment of lands of cotton textile mills granted by the
    Commissioner under this Regulation, the Government shall appoint a Monitoring
    Committee under the chairmanship of a retired High Court Judge with one representative
    each of the cotton textile mill owners, recognised trade union of cotton textile
    mill workers, the Commissioner and the Government as members. (b) The Commissioner
    shall provide to the Monitoring Committee the services of a Secretary and other
    required staff and also the necessary facilities for its functioning. (c) Without
    prejudice to the generality of the functions provided for in clause (a) of this
    Sub-Regulation, the Monitoring Committee shall:-- (i) lay down guidelines for
    the transparent disposal by sale or otherwise of built up space, open lands and
    balance FSI by the cotton textile mills; (ii) lay down guidelines for the opening,
    operation and closure of escrow accounts; (iii) approve proposals for the withdrawal
    and application of funds from the escrow accounts; (iv) monitor the implementation
    of the provisions of this regulation as regards housing, alternative employment
    and related training of cotton textile mill workers. (d) The Monitoring Committee
    shall have the powers of issuing and enforcing notices and attendance in the manner
    of a Civil Court. (e) Every direction or decision of the Monitoring Committee
    shall be final and conclusive and binding on all concerned. (f) The Monitoring
    Committee shall determine for itself the procedures and modalities of its functioning.
