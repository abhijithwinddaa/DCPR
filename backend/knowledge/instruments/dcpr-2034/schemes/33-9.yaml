    y1: 1.0
  raw_selected_text: 'DCPR-2034 PART - VI ADDITIONAL FLOOR SPACE INDEX 7) In this
    regulation the terms and expression shall have the meaning specified in Fin Tech
    Policy declared by Directorate of Information Technology vide Govt. Resolution
    No.DIT-2018/CR-17/D-1/39 dated 16th February 2018. Notwithstanding anything contained
    in the existing regulation, the above provisions shall be applicable for Smart
    Fin Tech Centre. Other provisions of existing regulations, which are not specifically
    mentioned in this regulation shall be applicable. 33( 14) Shifting of cattle sheds
    outside Greater Mumbai: For Development of lands becoming vacant consequent upon
    shifting of cattle sheds existing thereon, to places outside Greater Mumbai, additional
    FSI to the extent of 33% over and above Zonal (basic) permissible FSI, shall be
    allowed on land occupied by cattle sheds and subject to the following conditions:
    Such additional FSI shall be available for authorized / tolerated (existing prior
    to 01/04/ 1962) cattle sheds existing in Suburbs & extended Suburbs only; (ii)
    The development of such lands that have become vacant consequent upon shifting
    of cattle shall be regulated by the zoning Regulations of the zone in which such
    lands are situated. iii) The additional FSI shall be worked out case by case by
