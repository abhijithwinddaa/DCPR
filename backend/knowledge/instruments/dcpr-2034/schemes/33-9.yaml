    scheme shall be treated at par with non-slum residential plot that are attached
    to the scheme. However, utilization of TDR'' or ''Additional FSI on payment of
    premium'' on such non-slum plot shall not be permissible. 7.2 Slum Rehabilitation
    Permissible on Town Planning Scheme Plots: Slum Rehabilitation Project can be
    taken up on Town Planning Scheme plots also, after they are declared as slums/
    slum rehabilitation areas. 7.3 Contravening structures in the adjoining final
    plots, if declared as a slum rehabilitation area by the competent authority, may
    be included in the Slum Rehabilitation Scheme in the relevant Final Plot of the
    Town Planning Scheme. 7.4 In case of a slum rehabilitation project adjoining railway
    tracks, a boundary wall of minimum 2.4 m in height shall be constructed. Aaganwadi,
