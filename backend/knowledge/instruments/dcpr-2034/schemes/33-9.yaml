    plots wherein permissible Zonal F.S.I. is less than 1.00. (11) The premium amount
    so collected under rehabilitation scheme under this regulation shall be kept in
    the separate account to be utilized as shelter fund for the State of Maharashtra.
    11. Conversion of Old Project into New Project: 11.1 Provision of the Regulation
    9 (6) shall be applicable. Provided further that Projects, where LOI has been
    granted, shall be treated as per the DCR provisions existing on the date of LOI.
    In case such a project comes up for revised LOI or change of developer or any
