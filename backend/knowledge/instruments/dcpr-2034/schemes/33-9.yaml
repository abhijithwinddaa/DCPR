    \ shall not be linked to the issue of any certificate or NOC relating to the DRP.\
    \ 1.13 Recovery of pending dues such as assessment, compensation, occupational\
    \ charges, non-agricultural tax/ dues etc. pending with public authorities such\
    \ as State Govt, MHADA, and/or MCGM shall be dealt with separately and not be\
    \ linked to grant of approval or building permission to the DRP. 1.14 In respect\
    \ of those eligible hutment dwellers on site who do not join the Project willingly\
    \ the following steps shall be taken: i) Provision for all of them shall be made\
    \ in the renewal/rehabilitation component of the scheme. ii) The transit tenement\
    \ that would be allotted to them would also be indicated along with those who\
    \ have joined the Project iii) If they do not join the scheme within 15 days after\
