  raw_selected_text: DCPR-2034 PART - VI ADDITIONAL FLOOR SPACE INDEX 1.11 Premium
    for ownership and terms of lease-. That part of Government/ MCGM/MHADA land on
    which the rehabilitation component of the SRS will be constructed shall be leased
    to the Co- operative Housing Society of the slum-dwellers on 30 years. Annual
    lease rent of Rs. 1001 for 4000 per sq. m. of land or part thereof and lease shall
    be renewable for a further period of 30 years at a time simultaneously land under
    free sale component shall be leased directly to the Society/ Association of the
    purchasers of the tenement under free sale component. Pending the formation of
    the Society/ Association of the purchasers in the free sale component with a provision
    for further renewal for a period of 30 years at a time. The lease rent for the
    free sale component shall be fixed by SRA. In addition to above, the Developer/Co-op.
    Housing Society shall pay premium at the rate of 25% of ASR of the year of issue
    of LOI, in respect of SRS proposed to be undertaken on lands owned by Government,
    Semi-Government undertakings and Local Bodies and premium shall go to land owing
    authority such as MHADA, MCGM, MMRDA as the case may be as prescribed by the land-owning
    authority. The premium installment so recovered shall be remitted to concern land
    owing authority within 30 days from the date recovery. In the case of Govt. land
    the premium shall be deposited in NivaraNidhi. The amount of premium shall be
    recovered in installment as may be prescribed by Govt. from time to time. Land
    owning authority such as MCGM, MMRDA, MHADA shall not recover land premium in
    any other form. Proposals for SRS on land owned by Central Govt shall not be accepted
    unless NOC for the scheme is obtained from Central Govt. 1.12 Automatic cancellation
    of Vacant Land Tenure and leases- If any land or part of any land on which slum
    is located is under vacant land tenure, the said tenure/ lease created by MCGM
    or Municipal Commissioner shall stand automatically terminated
