    x1: 1.0
    y1: 1.0
  raw_selected_text: 'DCPR-2034 PART - VIIIGENERAL BUILDING REQUIRMENTS Ramps may
    be provided in accordance with DC Regulation 37(16). (32) Service Floor: A service
    floor of height not exceeding 1.8 m may be provided in a building exclusively
    for provision/ diversion of services. Provided further that a service floor with
    height exceeding 1.8 m may be allowed in a building of medical use or in building
    having height more than 70 m with the special permission of Commissioner with
    reasons recorded in writing. (33) Helipad: A helipad may be allowed on the rooftop
    of the building subject to; (i) structural stability certificate from the registered
    Structural Engineer, (ii) All other statutory permissions. (iii) unrestricted
    access as required by MCGM/any Government agencies in case of emergency and submission
    of registered undertaking to that effect. (38) Special Design Requirement For
    (I) Educational Building: (1) In addition to the class-rooms and other areas,
    every educational building shall be provided with- (a) a tiffin room with a minimum
    area of 18 sq. m for every 800 students orpart thereof; (b) a separate tiffin
    room for teachers where strength of students exceeds 1000; (c) a room/ space with
    drinking water facilities for every 300 students or part thereof on each of the
    floors. These requirements may be amended by the Commissioner in consultation
    with the Education Department of the State Government. (2) Play Ground- In case
    of educational development by Educational Institution on their vacant land, at
    least 40% of the plot area at one place (inclusive of recreational area as required
    under Regulation No 27)shall be provided mandatorily for Play Ground. However
    as per these Regulations, for the educational purpose if additional FSI is due,
    then while allowing said due FSI, it is not necessary to increase the area of
    Play Ground. Development Plan 2034 Developrnent Control andPromotionRegulation-2034
    Municipal Corporation of Greater Mumbai 327'
