  raw_selected_text: 'DCPR-2034 PART - VIIIGENERAL BUILDING REQUIRMENTS 40. Lighting
    and Ventilation (1) Adequacy and manner of provision- All parts of any habitable
    room shall be adequately lighted and ventilated. For this purpose, every room
    shall have (a) one or more apertures, excluding doors, with area not less than
    one- sixth of the floor area of the habitable room, with no part of any habitable
    room being more than 7.50 m away from the source of light and ventilation.However,
    a staircase shall be deemed to be adequately lighted and ventilated, if it has
    one or more openings, their area taken together measuring not less than 1 sq.
    m per landing on the external wall; (b) an opening with a minimum area of 1 sq.
    m in any habitable room including a kitchen, and 0.3 sq. m with one dimension
    of 0.3 m for any bathroom, water closet or store/ ; (c) all the walls, containing
    the openings for light and ventilation fully exposed to an exterior open space
    either directly or through a balcony not exceeding 2m. in width provided that
    a room meant for non- residential user shall be considered as adequately lighted
    and ventilated if its depth from the side abutting the required open space does
    not exceed 12 m and in case centrally air-conditioned building may be allowed
    to be exceeded up to 20 m. (2) Artificial ventilation shaft- A bathroom, water
    closet, staircase or store/ prayer room may abut on the ventilation shaft, the
    size of which shall not be less than the values given below: Height of buildings
    in metres. (m) Upt012 Upt018 Upt024 Upt030 Above 30 Cross-section of ventilation
    shaft in sq. 2.8 4.0 5.4 8.0 9.0 Minimum dimension of one side of shaft inmetres
    (m). 1.2 1.5 1.8 2.4 3.0 Mechanical ventilation system shall invariably be installed
    in such ventilation shafts. Further, such ventilation shaft shall be adequately
    accessible for maintenance. Development Plan 2034 Developrnent Control andPromotionRegulation-2034
    Municipal Corporation of Greater Mumbai 338'
