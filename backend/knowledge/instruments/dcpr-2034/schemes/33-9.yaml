    of recreational area as required under Regulation No 27) while allowing additional
    FSI as per these Regulations. Note- I) The permissible FSI shall be on the entire
    plot. 2) If existing Municipal Play Ground/ POS is abutting to the plot of Educational
    Institute or may be across the road, then the provision of 40% of play area within
    plot of Educational Institution may not be insisted upon if the combined play
