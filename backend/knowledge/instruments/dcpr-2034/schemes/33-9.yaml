  raw_selected_text: 'DCPR-2034 PART-I ADMINISTRATION 1. 2 PART-I ADMINISTRATION Short
    title, extent and commencement (I) Title: These Regulations shall be called the
    "Development Control and Promotion Regulations for Greater Mumbai,2034" (hereinafter
    called "these Regulations"). (11) Jurisdiction: These Regulations apply to building
    activity and development work in areas under the entire jurisdiction of the Municipal
    Corporation of Greater Mumbai (hereinafter called "the Corporation"). If there
    is a conflict between the requirements of these Regulations and those of any other
    rules or byelaws, these Regulations shall prevail. Provided, however, that in
    respect of areas included in a finally sanctioned Town Planning Scheme, if there
    is a conflict between the requirements of these Regulations and the Town Planning
    Scheme Regulations, the provisions of these Regulations shall prevail.. Provided
    further that, these regulations shall not apply to the Manori- Gorai-Uttan Notified
    area. (Ill) Protection:.No suit, prosecution or other legal proceedings shall
    lie against any person for anything which is in good faith done or intended to
    be done under the MR&TP Act or any rules or regulations made their under. Definitions
    of Terms and Expressions (I) General: In these Regulations, unless the context
    otherwise requires, the terms and expressions shall have the meaning indicated
    against each of them. (11) Meaning as in the Acts, Rules, etc.: Terms and expressions
    not defined in these Regulations shall have the same meanings as in the MR&TP
    Act, 1966 or the Mumbai Municipal Corporation Act, 1888 (Mumbai Act No. Ill of
    1888) and the rules or bye-laws framed there under, as the case may be, unless
    the context otherwise requires. (Ill)Terms and expressions neither defined in
    these Regulations nor defined in (I) and (11) above shall be interpreted with
    reference to the latest National Building Code in the relevant context. (I V)
    Definitions. ( 1) "Access" means clear approach to a plot or a building. De'
