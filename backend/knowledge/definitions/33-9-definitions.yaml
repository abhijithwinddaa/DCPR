  owner_entity_id: dcpr:scheme:33-9
  term: of BDD Chawls
  normalized_term: of bdd chawls
  definition_text: a scheme for redevelopment of the cluster of buildings and structures
    constructed by Bombay Development Division in the Island City of Mumbai, at four
    locations and boundaries of the area as shown in DPhereinafter referred to as
    " Urban Renewal Cluster or URC " shall be a cluster identified for urban renewal
    :-- 1) Under the Development Plan (DP) , where the DP contains such well-defined
    Clusters; or 2) Under the Urban Renewal Plan (URP) for the concerned area, prepared
    and notified by the Officer appointed by the Planning Authority, who may revise
